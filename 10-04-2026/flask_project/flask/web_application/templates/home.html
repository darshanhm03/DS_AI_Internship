<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abalone Age Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🐚 Abalone Age Predictor</h1>
            <p class="subtitle">Enter the physical measurements of an abalone to predict its age.</p>

            <form method="POST" action="/">
                <div class="form-group">
                    <label for="length">Length (mm)</label>
                    <input type="number" id="length" name="length" step="0.01" 
                           placeholder="e.g. 0.41" required>
                </div>

                <div class="form-group">
                    <label for="diameter">Diameter (mm)</label>
                    <input type="number" id="diameter" name="diameter" step="0.01" 
                           placeholder="e.g. 0.33" required>
                </div>

                <div class="form-group">
                    <label for="height">Height (mm)</label>
                    <input type="number" id="height" name="height" step="0.01" 
                           placeholder="e.g. 0.10" required>
                </div>

                <div class="form-group">
                    <label for="whole_weight">Whole Weight (grams)</label>
                    <input type="number" id="whole_weight" name="whole_weight" step="0.01" 
                           placeholder="e.g. 0.36" required>
                </div>

                <button type="submit" class="btn">Predict Age</button>
            </form>
        </div>
    </div>
</body>
</html>
